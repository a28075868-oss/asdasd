name: Build Entrada OS

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y nasm gcc-multilib g++-multilib binutils grub-pc-bin xorriso make
    
    - name: Build Entrada OS
      run: make
    
    - name: Upload ISO artifact
      uses: actions/upload-artifact@v3
      with:
        name: entrada-os-iso
        path: entrada.iso
        retention-days: 30
    
    - name: Display build info
      run: |
        echo "Build completed successfully!"
        ls -lh entrada.iso
        file entrada.iso
